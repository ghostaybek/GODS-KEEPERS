<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Выбор команды хранителей</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a2a3a;
            color: #eee;
            margin: 0;
            padding: 16px;
        }
        h1 {
            text-align: center;
            color: #ffd966;
            font-size: 1.8rem;
            margin: 0 0 20px 0;
        }
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            max-width: 1300px;
            margin: 0 auto;
        }
        .character-card {
            background: #2c3e4e;
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .character-card.selected {
            border-color: #ffd966;
            background: #3e5a6b;
            box-shadow: 0 0 12px rgba(255,217,102,0.4);
        }
        .character-name {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
        }
        .name-cyan { color: #00ffff; }
        .name-pink { color: #ff69b4; }
        .name-green { color: #00ff7f; }
        .name-red { color: #ff4444; }
        .name-purple { color: #aa66ff; }
        .name-gold { color: #ffd700; }

        .abilities {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }
        .ability-item {
            background: #1f3a46;
            border-radius: 16px;
            padding: 10px;
        }
        .ability-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .ability-name {
            color: #ffcc88;
        }
        .ability-cost {
            background: #00000055;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .ability-desc {
            font-size: 0.75rem;
            line-height: 1.3;
            color: #ddd;
            margin-top: 5px;
        }
        button {
            background: #ffaa44;
            color: #1e2a36;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 24px auto 16px;
            transition: background 0.2s;
            width: 90%;
            max-width: 300px;
        }
        button:disabled {
            background: #6c7a89;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background: #ffcc66;
        }
        .message {
            text-align: center;
            color: #ffaa66;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .characters-grid { grid-template-columns: 1fr; gap: 12px; }
            button { padding: 12px 20px; font-size: 1rem; }
            .character-name { font-size: 1.3rem; }
            .ability-desc { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <h1>⚔️ Выберите 5 хранителей ⚔️</h1>
    <div id="characters-grid" class="characters-grid"></div>
    <button id="ready-btn" disabled>Команда готова</button>
    <div id="message" class="message"></div>

    <script>
        const characters = [
            { id: 1, name: "Темпос", hp: 15, abilities: [
                { name: "Самурай", mana: 4, type: "normal", description: "рывок на сумму 2–4 клеток, наносящий всем на своём пути 3 урона." },
                { name: "Замедление времени", mana: 3, type: "normal", description: "перемещается в радиус 4 клеток." },
                { name: "У - Флэшбэк", mana: 0, type: "unique", description: "отматывает один ход назад (используется в любой момент игры)." }
            ] },
            { id: 2, name: "Гоуст", hp: 15, abilities: [
                { name: "Пистолет-призрак", mana: 4, type: "normal", description: "наносит 2 урона в сумме 4 клеток (может стрелять сквозь стены)." },
                { name: "Телепорт", mana: 4, type: "normal", description: "в радиусе 5 клеток." },
                { name: "У - Портал", mana: 4, type: "unique", description: "создаёт 2 портала в 2 любых точках карты (может убрать их в любой момент)." }
            ] },
            { id: 3, name: "Иллюжн", hp: 15, abilities: [
                { name: "Кинжал", mana: 3, type: "normal", description: "наносит 5 урона в радиусе 1 клетки." },
                { name: "Иллюзия", mana: 4, type: "normal", description: "оппонент в сумме 5 клеток притягивается к Иллюжну на 3 клетки." },
                { name: "У - Другой мир", mana: 5, type: "unique", description: "управляет оппонентом в сумме 1+ клеток в течение 1 хода (Иллюжн тратит ману своей команды)." }
            ] },
            { id: 4, name: "Форс", hp: 15, abilities: [
                { name: "Натиск саев", mana: 6, type: "normal", description: "наносит 4 урона в радиусе 4 клеток." },
                { name: "Отталкивание оппонента", mana: 5, type: "normal", description: "отталкивает выбранного оппонента в радиусе 4 клеток или в сумме 6 клеток на 1–2 клетки." },
                { name: "У - Телекинез", mana: 7, type: "unique", description: "перемещает всех Хранителей на 2 клетки." }
            ] },
            { id: 5, name: "Вита", hp: 15, abilities: [
                { name: "Зеркало миротворца", mana: 5, type: "normal", description: "отражает суммарный урон от оппонента, нанося ему на 1 урон (используется в ход оппонента)." },
                { name: "Жизни", mana: 7, type: "normal", description: "восстанавливает 3 хп себе или союзнику." },
                { name: "У - Лечение Хранителя", mana: 5, type: "unique", description: "воскрешает союзника, после воскрешения у него 5 хп." }
            ] },
            { id: 6, name: "Аюно", hp: 15, abilities: [
                { name: "Посох смерти", mana: 2, type: "normal", description: "наносит 2 урона в сумме 4 клеток." },
                { name: "В - Призыв скелета", mana: 8, type: "venom", description: "у него 5 хп и урон 4 в радиусе 1 клетки или 2 урона в сумме 4 клеток (им можно управлять; на поле может быть только один скелет)." },
                { name: "У - Воскрешение", mana: 0, type: "unique", description: "после смерти воскрешается в радиусе 10 клеток от места смерти с 1 хп." }
            ] },
            { id: 7, name: "Вампир", hp: 15, abilities: [
                { name: "Умбра (двуручный клинок)", mana: 6, type: "normal", description: "наносит 5 урона в радиусе 2 клеток, прибавляющий 1 хп Вампиру." },
                { name: "Жизненное высасывание", mana: 6, type: "normal", description: "вампирская магия, высасывающая 2 хп из Хранителя в сумме 5 клеток." },
                { name: "В - Бессмертие", mana: 0, type: "venom", description: "когда у Вампира остаётся 6 хп или меньше, высасывает 2 хп из ближайшего оппонента (используется в ход оппонента)." }
            ] },
            { id: 8, name: "Серпенс", hp: 15, abilities: [
                { name: "Ядовитый выстрел", mana: 4, type: "normal", description: "наносит 5 урона с вероятностью 6 в сумме 6 клеток." },
                { name: "В - Призыв змеи", mana: 10, type: "venom", description: "у неё 6 хп, она наносит 4 урона ядом в радиусе 3 клеток (на карте может быть только 1 змея)." },
                { name: "П - Плотная чешуя", mana: 0, type: "normal", description: "у Серпенса 18 хп с начала игры." }
            ] },
            { id: 9, name: "Ион", hp: 15, abilities: [
                { name: "Молнии из рук", mana: 4, type: "normal", description: "наносит 3 урона всем оппонентам в радиусе 3 клеток." },
                { name: "Разряд молнии", mana: 4, type: "normal", description: "наносит 2 урона в радиусе 4 клеток и не даёт оппоненту нанести урон в следующем ходу." },
                { name: "П - Энергия", mana: 0, type: "normal", description: "бесплатно может передвигаться на 1 клетку каждый ход." }
            ] },
            { id: 10, name: "Айси", hp: 15, abilities: [
                { name: "Ледяные шипы", mana: 3, type: "normal", description: "стреляет ледяными шипами по всем диагоналям в радиусе 3 клеток, нанося 4 урона." },
                { name: "Скольжение", mana: 1, type: "normal", description: "скользит на 1 клетку по диагонали." },
                { name: "У - Заморозка", mana: 9, type: "unique", description: "все оппоненты в радиусе 7 клеток пропускают ход, с каждым замёрзшим оппонентом снижено получение маны соперника за ход." }
            ] },
            { id: 11, name: "Друид", hp: 15, abilities: [
                { name: "Деревянный лук", mana: 5, type: "normal", description: "наносит 3 урона в радиусе 5 клеток (может стрелять через стены)." },
                { name: "В - Древесный захват", mana: 10, type: "venom", description: "оппонента в радиусе 5 клеток захватывают деревья; чтобы спасти его, союзник должен подбежать к пойманному и потратить 7 маны, иначе деревья убивают его." },
                { name: "У - Лечебные растения", mana: 12, type: "unique", description: "восстанавливает 3 хп каждому союзнику и себе." }
            ] },
            { id: 12, name: "Магмус", hp: 15, abilities: [
                { name: "Лавовый клинок", mana: 5, type: "normal", description: "наносит оппоненту в радиусе 1 кл. 7 урона." },
                { name: "Огненный дракон", mana: 3, type: "normal", description: "наносит 5 урона с вероятностью 5 в сумме 5 клеток." },
                { name: "В - Лавовый щит", mana: 2, type: "venom", description: "поглощает 2 урона от атаки (используется в ход оппонента)." }
            ] },
            { id: 13, name: "Нано", hp: 15, abilities: [
                { name: "Подрывные пули", mana: 6, type: "normal", description: "делает 2 выстрела (каждый наносит 3 урона с вероятностью 6) оппоненту в сумме 6 клеток." },
                { name: "В - Динамит", mana: 4, type: "venom", description: "устанавливает бомбу в сумме 2 клеток, наносящую 5 урона, если враг наступит на неё (на карте может быть только 1 динамит)." },
                { name: "У - Нано-жук", mana: 4, type: "unique", description: "уклоняется от любой атаки оппонента." }
            ] },
            { id: 14, name: "Кёрс", hp: 15, abilities: [
                { name: "Миниган", mana: 6, type: "normal", description: "делает 3 выстрела (каждый наносит 2 урона с вероятностью 7) оппоненту в сумме 5 клеток." },
                { name: "В - Ракетница", mana: 12, type: "venom", description: "летит в любую точку карты и наносит 8 урона, 7 урона в радиусе 1 клетки от точки, 6 урона — в радиусе 2 клеток; чтобы увернуться от неё, оппоненту даётся 1 ход." },
                { name: "П - Скорость", mana: 0, type: "normal", description: "бесплатно может передвигаться на 2 клетки каждый ход." }
            ] },
            { id: 15, name: "Сайтер", hp: 15, abilities: [
                { name: "Револьвер", mana: 6, type: "normal", description: "делает 2 выстрела (каждый наносит 3 урона с вероятностью 7) оппоненту в сумме 4 клеток." },
                { name: "В - Винтовка", mana: 10, type: "venom", description: "наносит 10 урона в сумме 4+ клеток." },
                { name: "У - Дымовуха", mana: 0, type: "unique", description: "скрывает Сайтера, и он перемещается в любую точку в радиусе 7 клеток." }
            ] }
        ];

        function getNameColorClass(name) {
            const colorMap = {
                "Темпос": "name-cyan",
                "Гоуст": "name-pink",
                "Иллюжн": "name-pink",
                "Форс": "name-pink",
                "Вита": "name-green",
                "Аюно": "name-red",
                "Вампир": "name-red",
                "Серпенс": "name-red",
                "Ион": "name-purple",
                "Айси": "name-purple",
                "Друид": "name-purple",
                "Магмус": "name-purple",
                "Нано": "name-gold",
                "Кёрс": "name-gold",
                "Сайтер": "name-gold"
            };
            return colorMap[name] || "";
        }

        let selectedIds = [];

        function renderCharacters() {
            const grid = document.getElementById('characters-grid');
            grid.innerHTML = '';
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = `character-card ${selectedIds.includes(char.id) ? 'selected' : ''}`;
                card.dataset.id = char.id;
                const colorClass = getNameColorClass(char.name);
                let abilitiesHtml = '<div class="abilities">';
                char.abilities.forEach(ab => {
                    abilitiesHtml += `
                        <div class="ability-item">
                            <div class="ability-header">
                                <span class="ability-name">${ab.name}</span>
                                <span class="ability-cost">${ab.mana} м</span>
                            </div>
                            <div class="ability-desc">${ab.description}</div>
                        </div>
                    `;
                });
                abilitiesHtml += '</div>';
                card.innerHTML = `
                    <div class="character-name ${colorClass}">${char.name}</div>
                    ${abilitiesHtml}
                `;
                card.addEventListener('click', () => toggleSelection(char.id));
                grid.appendChild(card);
            });
        }

        function toggleSelection(id) {
            const index = selectedIds.indexOf(id);
            if (index === -1) {
                if (selectedIds.length >= 5) {
                    document.getElementById('message').textContent = 'Можно выбрать только 5 хранителей!';
                    return;
                }
                selectedIds.push(id);
            } else {
                selectedIds.splice(index, 1);
            }
            document.getElementById('message').textContent = '';
            renderCharacters();
            updateReadyButton();
        }

        function updateReadyButton() {
            const btn = document.getElementById('ready-btn');
            btn.disabled = selectedIds.length !== 5;
        }

        document.getElementById('ready-btn').addEventListener('click', () => {
            if (selectedIds.length === 5) {
                localStorage.setItem('selectedCharacters', JSON.stringify(selectedIds));
                localStorage.removeItem('currentMana');
                localStorage.removeItem('charactersHP');
                localStorage.removeItem('actionHistory');
                localStorage.removeItem('usedUniqueAbilities');
                localStorage.removeItem('blockedVenomAbilities');
                localStorage.removeItem('savedStateBeforeTurn');
                window.location.href = 'game.html';
            }
        });

        renderCharacters();
        updateReadyButton();
    </script>
</body>
</html>
