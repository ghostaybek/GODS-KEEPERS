<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Выбор режима игры</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1a24;
            color: #eee;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            text-align: center;
            color: #ffd966;
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        .mode-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            padding: 1rem;
        }
        .mode-btn {
            background: transparent;
            border: 3px solid #2ecc71;
            color: #2ecc71;
            font-size: 2rem;
            font-weight: bold;
            padding: 1rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 200px;
            text-align: center;
        }
        .mode-btn:hover {
            background: #2ecc71;
            color: #1e2a36;
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .mode-btn { font-size: 1.5rem; padding: 0.8rem 1.5rem; min-width: 150px; }
        }
    </style>
</head>
<body>
    <h1>🎮 Играем! Выберите тип игры:</h1>
    <div class="mode-buttons">
        <div class="mode-btn" id="mode-3x3">3x3</div>
        <div class="mode-btn" id="mode-4x4">4x4</div>
    </div>
    <script>
        document.getElementById('mode-3x3').addEventListener('click', () => {
            window.location.href = '1team3x3.html';
        });
        document.getElementById('mode-4x4').addEventListener('click', () => {
            window.location.href = 'couple1_4x4.html';
        });
    </script>
</body>
</html>
